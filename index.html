
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Million KM | iOS Premium Experience</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --system-blue: #007AFF;
      --system-red: #FF3B30;
      --system-green: #34C759;
      --system-gray: #8E8E93;
      --bg: #F2F2F7;
      --card: rgba(255, 255, 255, 0.75);
      --text-primary: #1D1D1F;
      --text-secondary: #86868B;
      --radius-ios: 36px;
      --radius-island: 24px;
    }

    body { 
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background-color: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      letter-spacing: -0.02em;
    }

    .apple-glass {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: saturate(180%) blur(25px);
      -webkit-backdrop-filter: saturate(180%) blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .dark-glass {
      background: rgba(20, 20, 20, 0.85);
      backdrop-filter: saturate(180%) blur(25px);
      -webkit-backdrop-filter: saturate(180%) blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .squircle { border-radius: var(--radius-ios); }
    
    .animate-spring { animation: springIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    
    @keyframes springIn {
      0% { transform: scale(0.9) translateY(20px); opacity: 0; filter: blur(10px); }
      70% { transform: scale(1.02) translateY(-2px); opacity: 1; filter: blur(0); }
      100% { transform: scale(1) translateY(0); }
    }

    @keyframes islandPop {
      0% { transform: translate(-50%, -100%) scaleX(0.5) scaleY(0.2); opacity: 0; filter: blur(15px); }
      60% { transform: translate(-50%, 20px) scaleX(1.1) scaleY(1.1); opacity: 1; filter: blur(0); }
      100% { transform: translate(-50%, 15px) scaleX(1) scaleY(1); }
    }

    .animate-dynamic-island { animation: islandPop 0.6s cubic-bezier(0.19, 1, 0.22, 1) forwards; }
    
    .ios-scroll::-webkit-scrollbar { width: 0px; }
    
    .tap-active:active { transform: scale(0.96); transition: transform 0.1s ease; }
    
    .ios-card {
      transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
      box-shadow: 0 10px 40px -10px rgba(0,0,0,0.03);
    }
    
    .ios-card:hover {
      box-shadow: 0 20px 60px -15px rgba(0,0,0,0.08);
      transform: translateY(-4px);
    }

    ::selection { background: rgba(0, 122, 255, 0.15); color: var(--system-blue); }
  </style>

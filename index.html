
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Million KM | Premium Auto Experience</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FBFBFF;
      --card: rgba(255, 255, 255, 0.72);
      --accent: #007AFF;
    }
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background-color: var(--bg);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    .apple-glass {
      background: var(--card);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.4);
    }
    .squircle { border-radius: 32px; }
    .squircle-lg { border-radius: 48px; }
    @keyframes springIn {
      0% { transform: scale(0.9) translateY(30px); opacity: 0; filter: blur(10px); }
      100% { transform: scale(1) translateY(0); opacity: 1; filter: blur(0); }
    }
    .animate-spring { animation: springIn 0.8s cubic-bezier(0.2, 1, 0.3, 1) forwards; }
    .tap-active:active { transform: scale(0.96); transition: transform 0.1s; }
  </style>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Babel for Browser-side Compiling -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    :root {
      --primary: #007aff;
      --bg: #f5f5f7;
      --card: rgba(255, 255, 255, 0.85);
      --text: #1d1d1f;
    }
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background-color: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    
    /* Apple Glass Effect */
    .apple-glass {
      background: var(--card);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.6);
    }
    
    .squircle { border-radius: 20px; }
    .squircle-lg { border-radius: 32px; }
    
    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade { animation: fadeIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
    
    .tap-active:active { transform: scale(0.96); transition: transform 0.1s; }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #d1d1d6; border-radius: 10px; }
    
    /* Mobile Nav Transition */
    .mobile-nav {
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      transform: translateY(-100%);
    }
    .mobile-nav.open { transform: translateY(0); }
  </style>

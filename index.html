  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #007aff;
      --bg: #f5f5f7;
      --card: #ffffff;
      --text: #1d1d1f;
      --gray: #6e6e73;
      --green: #34c759;
      --red: #ff3b30;
      --apple-font: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    body { 
      font-family: var(--apple-font); 
      background-color: var(--bg);
      color: var(--text);
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    .glass { 
      background: rgba(255, 255, 255, 0.8); 
      backdrop-filter: saturate(180%) blur(20px); 
      -webkit-backdrop-filter: saturate(180%) blur(20px); 
    }
    .radius-apple { border-radius: 20px; }
    .card-shadow { box-shadow: 0 8px 30px rgba(0,0,0,0.04); }
    .hero-gradient {
      background: radial-gradient(circle at top right, rgba(0, 122, 255, 0.05), transparent 40%),
                  radial-gradient(circle at bottom left, rgba(0, 122, 255, 0.03), transparent 40%);
    }
    .modal-open { overflow: hidden; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in { animation: fadeIn 0.6s ease-out forwards; }
  </style>

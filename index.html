
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Million KM | Premium Avto Servis</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Icons & Fonts -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Babel for Browser-side Compiling -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    :root {
      --system-blue: #007AFF;
      --bg: #F2F2F7;
      --card: rgba(255, 255, 255, 0.72);
      --text-primary: #1D1D1F;
      --radius-ios: 32px;
    }

    body { 
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background-color: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      letter-spacing: -0.02em;
    }

    .apple-glass {
      background: var(--card);
      backdrop-filter: saturate(180%) blur(25px);
      -webkit-backdrop-filter: saturate(180%) blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .squircle { border-radius: var(--radius-ios); }
    
    @keyframes springIn {
      0% { transform: scale(0.9) translateY(20px); opacity: 0; filter: blur(10px); }
      70% { transform: scale(1.02) translateY(-2px); opacity: 1; filter: blur(0); }
      100% { transform: scale(1) translateY(0); }
    }
    .animate-spring { animation: springIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

    @keyframes islandPop {
      0% { transform: translate(-50%, -100%) scaleX(0.5) scaleY(0.2); opacity: 0; filter: blur(15px); }
      60% { transform: translate(-50%, 20px) scaleX(1.1) scaleY(1.1); opacity: 1; filter: blur(0); }
      100% { transform: translate(-50%, 15px) scaleX(1) scaleY(1); }
    }
    .animate-dynamic-island { animation: islandPop 0.6s cubic-bezier(0.19, 1, 0.22, 1) forwards; }
    
    .tap-active:active { transform: scale(0.96); transition: transform 0.1s ease; }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 0px; }
  </style>

  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "@google/genai": "https://esm.sh/@google/genai@1.38.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module" data-presets="react,typescript" src="index.tsx"></script>
</body>
</html>

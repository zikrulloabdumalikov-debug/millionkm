<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Million KM | Premium Avto Servis</title>
  
  <!-- Tailwind CSS (Development/Simple Production) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Icons & Fonts -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --system-blue: #007AFF;
      --bg: #F8F9FA;
      --card: rgba(255, 255, 255, 0.85);
      --text-primary: #1D1D1F;
      --radius-ios: 28px;
    }

    html { scroll-behavior: smooth; }

    body { 
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background-color: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      letter-spacing: -0.01em;
    }

    .apple-glass {
      background: var(--card);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.4);
    }

    .squircle { border-radius: var(--radius-ios); }
    
    @keyframes springIn {
      0% { transform: scale(0.95) translateY(10px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    .animate-spring { animation: springIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }

    .tap-active:active { transform: scale(0.97); transition: transform 0.1s ease; }
    
    .ios-scroll::-webkit-scrollbar { width: 3px; }
    .ios-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.05); border-radius: 10px; }
    
    @media (max-width: 640px) {
      .squircle { border-radius: 20px; }
      h1 { font-size: 2.5rem !important; }
    }
  </style>
<script type="importmap">

  }
}
</script>

</html>

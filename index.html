
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Million KM | Premium Auto Experience</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --system-blue: #007AFF;
      --system-red: #FF3B30;
      --system-green: #34C759;
      --system-gray: #8E8E93;
      --bg: #FBFBFF;
      --card: rgba(255, 255, 255, 0.72);
      --text-primary: #1D1D1F;
      --text-secondary: #86868B;
    }

    body { 
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background-color: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      letter-spacing: -0.02em;
    }

    .apple-glass {
      background: var(--card);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .squircle { border-radius: 32px; }
    .squircle-lg { border-radius: 48px; }

    /* Keyframe Animatsiyalar */
    @keyframes springIn {
      0% { transform: scale(0.95) translateY(30px); opacity: 0; filter: blur(10px); }
      70% { transform: scale(1.02) translateY(-5px); opacity: 1; filter: blur(0); }
      100% { transform: scale(1) translateY(0); }
    }

    @keyframes islandPop {
      0% { transform: translate(-50%, -100%) scaleX(0.5); opacity: 0; }
      100% { transform: translate(-50%, 20px) scaleX(1); opacity: 1; }
    }

    .animate-spring { animation: springIn 0.8s cubic-bezier(0.2, 1, 0.3, 1) forwards; }
    .animate-dynamic-island { animation: islandPop 0.6s cubic-bezier(0.19, 1, 0.22, 1) forwards; }
    
    .tap-active:active { transform: scale(0.96); transition: transform 0.1s ease; }
    
    .gradient-text {
      background: linear-gradient(135deg, #1d1d1f 0%, #434343 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .ios-card-shadow {
      box-shadow: 0 15px 45px -12px rgba(0,0,0,0.08);
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 0px; }
  </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",

    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
</body>
</html>
